<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 面试助手</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>面</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #0b0e17;
      color: #e2e8f0;
      overflow: hidden;
      height: 100vh;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3e; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a52; }

    .glass {
      background: rgba(24, 24, 37, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(42, 42, 62, 0.5);
    }
    .glass-strong {
      background: rgba(24, 24, 37, 0.92);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(42, 42, 62, 0.6);
    }
    .glow-border:focus-within { border-color: rgba(245,158,11,0.4); box-shadow: 0 0 0 2px rgba(245,158,11,0.1); }

    .msg-enter { animation: slideUp 0.35s ease-out both; }
    .msg-user { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: #0b0e17; }
    .msg-ai { background: linear-gradient(135deg, #1e293b 0%, #181825 100%); border: 1px solid rgba(42,42,62,0.4); }
    .msg-system { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #6ee7b7; }

    .typing-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f59e0b;
      animation: bounceDot 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounceDot {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    .stage-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; border-radius: 9999px;
      font-size: 0.75rem; font-weight: 500;
      transition: all 0.3s ease;
      border: 1px solid transparent;
    }
    .stage-active { background: rgba(245,158,11,0.15); color: #f59e0b; border-color: rgba(245,158,11,0.3); }
    .stage-done { background: rgba(16,185,129,0.1); color: #10b981; border-color: rgba(16,185,129,0.2); }
    .stage-wait { background: transparent; color: #64748b; border-color: #2a2a3e; }

    .score-ring { transition: stroke-dashoffset 0.8s ease; }

    .shimmer-bg {
      background: linear-gradient(110deg, #181825 30%, #252540 50%, #181825 70%);
      background-size: 200% 100%;
      animation: shimmer 3s ease-in-out infinite;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .sidebar.open { display: flex; position: fixed; inset: 0; z-index: 50; }
    }
  </style>
</head>
<body>
  <div id="app" class="h-screen flex flex-col">
    <!-- ===== HEADER ===== -->
    <header class="glass-strong shrink-0 px-5 py-3 flex items-center justify-between z-10">
      <div class="flex items-center gap-4">
        <h1 class="font-display text-xl tracking-wide" style="color:#f59e0b">面</h1>
        <span class="text-sm text-slate-300 font-medium tracking-wider hidden sm:inline">AI 面试助手</span>
        <span v-if="mode" class="ml-2 px-2.5 py-0.5 rounded text-[11px] font-mono uppercase tracking-widest" :class="isInterviewEnded ? 'bg-emerald/10 text-emerald' : 'bg-accent/10 text-accent'">{{ mode }}</span>
      </div>
      <div class="flex items-center gap-3 text-xs text-slate-500">
        <template v-if="sessionId">
          <span class="hidden md:inline font-mono">#{{ sessionId.slice(0,8) }}</span>
          <span class="w-1.5 h-1.5 rounded-full" :class="isTyping ? 'bg-accent animate-pulse' : isInterviewEnded ? 'bg-emerald' : 'bg-slate-600'"></span>
        </template>
      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <div class="flex-1 flex overflow-hidden">

      <!-- ===== HISTORY SIDEBAR ===== -->
      <aside class="w-56 shrink-0 border-r border-border flex-col overflow-hidden hidden md:flex" style="background:rgba(24,24,37,0.4)">
        <div class="p-3 border-b border-border shrink-0">
          <h2 class="text-xs font-medium text-slate-400 uppercase tracking-wider">面试记录</h2>
        </div>
        <div class="flex-1 overflow-y-auto p-2 space-y-1">
          <div v-for="item in interviewHistory" :key="item.sessionId"
            @click="resumeSession(item.sessionId)"
            class="p-2.5 rounded-lg cursor-pointer text-xs transition-all duration-200 group"
            :class="item.sessionId === sessionId ? 'bg-accent/10 border border-accent/20' : 'hover:bg-white/5 border border-transparent'">
            <div class="flex items-start justify-between gap-1">
              <span class="text-slate-300 font-medium truncate flex-1">{{ item.label }}</span>
              <button @click.stop="deleteHistoryItem(item.sessionId)" class="opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-400 transition-opacity shrink-0">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
            <div class="flex justify-between text-slate-600 mt-1">
              <span>{{ item.date }}</span>
              <span>{{ item.turnCount }} 轮</span>
            </div>
          </div>
          <div v-if="!interviewHistory.length" class="text-center text-slate-600 text-xs py-8">
            暂无面试记录
          </div>
        </div>
        <div class="p-2 border-t border-border shrink-0">
          <button @click="startNewInterview"
            class="w-full py-2 rounded-lg text-xs font-medium transition-all duration-200"
            :class="phase === 'config' ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-accent/10 text-accent hover:bg-accent/20'"
            :disabled="phase === 'config'">
            ＋ 新面试
          </button>
        </div>
      </aside>

      <!-- ===== MAIN CONTENT ===== -->
      <div class="flex-1 flex overflow-hidden">

      <!-- ===== CONFIG PANEL (pre-interview) ===== -->
      <div v-if="phase === 'config'" class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-lg">
          <div class="text-center mb-10">
            <div class="font-display text-6xl mb-4" style="color:#f59e0b">面</div>
            <h2 class="text-2xl font-bold text-slate-100">模拟面试</h2>
            <p class="text-slate-500 text-sm mt-2">上传简历与岗位描述，开始一场真实的技术面试</p>
          </div>

          <div class="glass rounded-2xl p-6 space-y-5">
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5 tracking-wider uppercase">岗位描述 JD</label>
              <textarea v-model="jdContent"
                class="w-full bg-[#0b0e17] border border-border rounded-xl px-4 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none glow-border transition-colors resize-none"
                placeholder="粘贴目标岗位 JD 内容..." rows="5" :disabled="isInterviewing"></textarea>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-400 mb-1.5 tracking-wider uppercase">简历 PDF</label>
              <div @click="$refs.fileInput.click()"
                class="w-full bg-[#0b0e17] border border-border rounded-xl px-4 py-3 text-sm text-slate-400 flex items-center gap-3 transition-colors cursor-pointer hover:border-accent/30"
                :class="{'border-accent/40': resumeName}">
                <svg class="w-5 h-5 shrink-0" :class="resumeName ? 'text-accent' : 'text-slate-600'" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                <span>{{ resumeName || '点击选择 PDF 文件' }}</span>
              </div>
              <input ref="fileInput" type="file" accept=".pdf" @change="handleFileUpload" class="absolute w-0 h-0 opacity-0 -z-10">
            </div>
            <div v-if="errorMessage" class="bg-red-900/30 border border-red-800/40 rounded-xl px-4 py-3 text-sm text-red-300 flex items-start gap-2">
              <svg class="w-4 h-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <div class="flex-1">{{ errorMessage }}</div>
              <button @click="errorMessage=''; isInterviewing=false" class="text-red-400 hover:text-red-200 text-xs shrink-0">重置</button>
            </div>
            <button @click="startInterview"
              class="w-full py-3 rounded-xl font-medium text-sm transition-all duration-300"
              :class="!jdContent || !resumeFile ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-accent text-[#0b0e17] hover:bg-accent-hover hover:shadow-lg hover:shadow-accent/20 active:scale-[0.98]'"
              :disabled="!jdContent || !resumeFile || isInterviewing">
              <span v-if="isInterviewing" class="flex items-center justify-center gap-2">
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                初始化中...
              </span>
              <span v-else>开始面试</span>
            </button>
          </div>

          <p class="text-center text-xs text-slate-600 mt-6">面试过程由 AI 驱动 · 支持多阶段技术面 · 自动生成评估报告</p>
        </div>
      </div>

      <!-- ===== INTERVIEW LAYOUT ===== -->
      <template v-if="phase === 'interview' || phase === 'end'">

        <!-- Chat Area -->
        <div class="flex-1 flex flex-col min-w-0">
          <!-- Stage Banner -->
          <div class="shrink-0 px-5 py-2.5 flex items-center gap-2 overflow-x-auto" style="background:rgba(24,24,37,0.3)">
            <template v-for="(s, i) in stageList" :key="s">
              <span class="stage-pill whitespace-nowrap"
                :class="stageIndex === i ? 'stage-active' : i < stageIndex ? 'stage-done' : 'stage-wait'">
                <svg v-if="i < stageIndex" class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
                <span v-else-if="i === stageIndex" class="w-2 h-2 rounded-full bg-accent animate-pulse"></span>
                <span v-else class="w-2 h-2 rounded-full bg-slate-600"></span>
                {{ stageLabels[i] || s }}
              </span>
              <svg v-if="i < stageList.length-1" class="w-4 h-4 shrink-0 text-slate-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </template>
          </div>

          <!-- Messages -->
          <div ref="chatRef" class="flex-1 overflow-y-auto px-5 py-4 space-y-3 scroll-smooth">
            <div v-for="(msg, idx) in messages" :key="msg._key"
              class="msg-enter flex" :class="msg.type === 'user' ? 'justify-end' : 'justify-start'"
              :style="{animationDelay: '0s'}">
              <div class="max-w-[75%] md:max-w-[65%] rounded-2xl px-4 py-3 text-sm leading-relaxed"
                :class="msg.type === 'user' ? 'msg-user rounded-br-md' : msg.type === 'system' ? 'msg-system' : 'msg-ai rounded-bl-md'">
                <div class="text-[11px] font-medium tracking-wider mb-1 opacity-60"
                  :class="msg.type === 'user' ? 'text-right' : ''">
                  {{ msg.type === 'user' ? '你' : msg.type === 'system' ? '系统' : '面试官' }}
                </div>
                <div v-html="msg.content"></div>
              </div>
            </div>

            <!-- Typing -->
            <div v-if="isTyping" class="flex justify-start msg-enter">
              <div class="msg-ai rounded-2xl rounded-bl-md px-5 py-4">
                <div class="flex items-center gap-2.5">
                  <div class="typing-dot"></div>
                  <div class="typing-dot"></div>
                  <div class="typing-dot"></div>
                </div>
              </div>
            </div>

            <!-- Error -->
            <div v-if="errorMessage" class="flex justify-center msg-enter">
              <div class="bg-red-900/30 border border-red-800/40 rounded-xl px-4 py-2.5 text-sm text-red-300 flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {{ errorMessage }}
              </div>
            </div>

            <!-- End -->
            <div v-if="isInterviewEnded && !isTyping" class="flex justify-center msg-enter">
              <div class="bg-emerald/10 border border-emerald/20 rounded-xl px-5 py-3 text-sm text-emerald text-center">
                <div class="font-medium mb-1">面试已结束</div>
                <div class="text-emerald/70 text-xs">点击下方按钮查看完整评估报告</div>
              </div>
            </div>
          </div>

          <!-- Input -->
          <div class="shrink-0 px-4 py-3" style="background:rgba(11,14,23,0.8)">
            <div class="flex items-end gap-2 max-w-4xl mx-auto">
              <div class="flex-1 relative glow-border rounded-xl transition-colors" :class="isInterviewEnded || !sessionId ? 'opacity-50' : ''">
                <textarea v-model="userInput" @keydown.enter.ctrl="sendMessage" :disabled="!sessionId || isInterviewEnded"
                  class="w-full bg-[#0b0e17] border border-border rounded-xl pl-4 pr-10 py-3 text-sm text-slate-200 placeholder-slate-600 focus:outline-none resize-none"
                  placeholder="输入你的回答… (Ctrl+Enter 发送)" rows="2"></textarea>
                <button @click="sendMessage" :disabled="!sessionId || !userInput.trim() || isInterviewEnded"
                  class="absolute right-2 bottom-2 w-8 h-8 rounded-lg flex items-center justify-center transition-all duration-200"
                  :class="!userInput.trim() ? 'text-slate-700' : 'bg-accent text-[#0b0e17] hover:bg-accent-hover active:scale-90'">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
              </div>
              <button @click="endInterview" :disabled="!sessionId || isInterviewEnded || isEvaluating"
                class="px-3 py-3 rounded-xl border text-xs font-medium transition-all duration-200"
                :class="isInterviewEnded || isEvaluating ? 'border-border text-slate-600' : 'border-border hover:border-red-800/40 text-slate-400 hover:text-red-300 hover:bg-red-900/10'">
                <span class="hidden sm:inline">{{ isEvaluating ? '生成中...' : '结束' }}</span>
                <svg class="w-4 h-4 sm:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
              </button>
            </div>
          </div>
        </div>

        <!-- ===== SIDEBAR ===== -->
        <aside class="sidebar w-72 shrink-0 border-l border-border flex flex-col overflow-y-auto" style="background:rgba(24,24,37,0.4)">
          <!-- Stage Progress -->
          <div class="p-4 border-b border-border">
            <div class="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-3">面试进度</div>
            <div class="flex items-center justify-between mb-1.5">
              <span class="text-xs text-slate-400">总轮次</span>
              <span class="text-xs font-mono text-slate-300">{{ totalTurns }} 轮</span>
            </div>
            <div class="w-full h-1.5 rounded-full bg-slate-800 overflow-hidden">
              <div class="h-full rounded-full transition-all duration-500 ease-out" :style="{width: Math.min(totalTurns/15*100, 100)+'%', background: 'linear-gradient(90deg, #f59e0b, #fbbf24)'}"></div>
            </div>
            <div class="flex items-center justify-between mt-3">
              <span class="text-xs text-slate-400">当前阶段</span>
              <span class="text-xs font-mono text-slate-300">{{ stageTurnCount }} 轮</span>
            </div>
          </div>

          <!-- Scores -->
          <div class="p-4 border-b border-border" v-if="scores">
            <div class="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-3">评分</div>
            <div class="space-y-2.5">
              <div v-for="s in scoreDefs" :key="s.key" class="flex items-center gap-2">
                <span class="text-xs text-slate-400 w-16 shrink-0">{{ s.label }}</span>
                <div class="flex-1 h-1.5 rounded-full bg-slate-800 overflow-hidden">
                  <div class="h-full rounded-full transition-all duration-700 ease-out"
                    :style="{width: ((scores[s.key]||0)/10*100)+'%', background: scoreColor(scores[s.key])}"></div>
                </div>
                <span class="text-xs font-mono w-5 text-right" :class="scoreTextColor(scores[s.key])">{{ scores[s.key] || 0 }}</span>
              </div>
            </div>
          </div>

          <!-- Tags -->
          <div class="p-4 border-b border-border" v-if="questionTags && questionTags.length">
            <div class="text-[11px] font-medium tracking-wider text-slate-500 uppercase mb-3">能力标签</div>
            <div class="flex flex-wrap gap-1.5">
              <span v-for="tag in questionTags" :key="tag"
                class="px-2.5 py-1 rounded-full text-[11px] font-medium"
                :style="{background: 'rgba(245,158,11,0.1)', color: '#fbbf24', border: '1px solid rgba(245,158,11,0.2)'}">
                {{ tag }}
              </span>
            </div>
          </div>

          <!-- JD Resume (collapsible) -->
          <div class="p-4 border-b border-border">
            <button @click="showContext = !showContext" class="flex items-center justify-between w-full text-[11px] font-medium tracking-wider text-slate-500 uppercase">
              <span>面试上下文</span>
              <svg class="w-3.5 h-3.5 transition-transform" :class="showContext ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"/></svg>
            </button>
            <div v-show="showContext" class="mt-2 space-y-2">
              <div class="text-xs text-slate-400 bg-[#0b0e17] rounded-lg p-2.5 max-h-24 overflow-y-auto">
                <div class="text-[10px] text-slate-600 font-medium mb-1">JD</div>
                <div class="leading-relaxed">{{ jdContent?.slice(0,200) }}{{ jdContent?.length > 200 ? '…' : '' }}</div>
              </div>
            </div>
          </div>

          <!-- End Interview Button -->
          <div class="p-4 mt-auto" v-if="!isInterviewEnded">
            <button @click="endInterview" :disabled="isEvaluating"
              class="w-full py-2 rounded-lg border text-xs transition-all duration-200"
              :class="isEvaluating ? 'border-slate-700 text-slate-600 cursor-not-allowed' : 'border-border text-slate-400 hover:text-red-300 hover:border-red-800/40 hover:bg-red-900/5'">
              {{ isEvaluating ? '报告生成中...' : '结束当前面试' }}
            </button>
          </div>
          <div class="p-4 mt-auto" v-if="isInterviewEnded">
            <button @click="evaluateInterview" :disabled="isEvaluating"
              class="w-full py-2.5 rounded-xl text-xs font-medium transition-all duration-200"
              :class="isEvaluating ? 'bg-slate-800 text-slate-500 cursor-not-allowed' : 'bg-accent text-[#0b0e17] hover:bg-accent-hover active:scale-[0.98]'">
              <span v-if="isEvaluating" class="flex items-center justify-center gap-2">
                <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
                报告生成中...
              </span>
              <span v-else>查看评估报告</span>
            </button>
          </div>
        </aside>

      </template>
      </div>
    </div>
  </div>

  <!-- Tailwind (load early but non-blocking) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            display: ['ZCOOL QingKe HuangYou', 'serif'],
            body: ['Noto Sans SC', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            surface: { DEFAULT: '#181825', light: '#1e1e32', lighter: '#252540' },
            border: { DEFAULT: '#2a2a3e', light: '#3a3a52' },
            accent: { DEFAULT: '#f59e0b', hover: '#d97706', light: '#fbbf24' },
            emerald: { DEFAULT: '#10b981', dark: '#059669' },
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out both',
            'slide-up': 'slideUp 0.4s ease-out both',
            'pulse-glow': 'pulseGlow 2s ease-in-out infinite',
            'bounce-dot': 'bounceDot 1.4s infinite ease-in-out both',
            'shimmer': 'shimmer 3s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseGlow: { '0%, 100%': { boxShadow: '0 0 8px rgba(245,158,11,0.15)' }, '50%': { boxShadow: '0 0 20px rgba(245,158,11,0.3)' } },
            shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } },
          }
        }
      }
    }
  </script>
  <!-- Vue + marked -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
  <script>
  const { createApp } = Vue;
  createApp({
    data() {
      return {
        jdContent: '',
        resumeFile: null,
        resumeName: '',
        sessionId: null,
        mode: null,
        isInterviewing: false,
        isInterviewEnded: false,
        messages: [],
        userInput: '',
        isTyping: false,
        errorMessage: '',
        eventSource: null,
        currentStage: null,
        stageTurnCount: 0,
        totalTurns: 0,
        scores: null,
        questionTags: [],
        isEvaluating: false,
        showContext: false,
        msgCounter: 0,
        stageList: ['OPENING','MOTIVATION','PROJECT','BACKEND','LLM_RAG','BEHAVIOR','CLOSEOUT'],
        stageLabels: ['开场','动机','项目','后端','LLM/RAG','行为','收尾'],
        scoreDefs: [
          { key: 'clarity', label: '表达' },
          { key: 'depth', label: '深度' },
          { key: 'evidence', label: '量化' },
          { key: 'tradeoff', label: '权衡' },
          { key: 'retrospect', label: '复盘' },
        ],
        interviewHistory: [],
      };
    },
    computed: {
      phase() {
        if (this.isInterviewEnded && this.messages.length > 0) return 'end';
        if (this.sessionId) return 'interview';
        return 'config';
      },
      stageIndex() {
        const i = this.stageList.indexOf(this.currentStage);
        return i >= 0 ? i : 0;
      },
    },
    methods: {
      scoreColor(v) {
        if (!v) return '#374151';
        if (v >= 8) return '#10b981';
        if (v >= 6) return '#f59e0b';
        if (v >= 4) return '#f97316';
        return '#ef4444';
      },
      scoreTextColor(v) {
        if (!v) return 'text-slate-600';
        if (v >= 8) return 'text-emerald';
        if (v >= 6) return 'text-accent';
        if (v >= 4) return 'text-orange-400';
        return 'text-red-400';
      },
      handleFileUpload(e) {
        this.resumeFile = e.target.files[0];
        this.resumeName = this.resumeFile ? this.resumeFile.name : '';
      },
      async startInterview() {
        if (!this.jdContent || !this.resumeFile) return;
        this.isInterviewing = true;
        this.errorMessage = '';
        const fd = new FormData();
        fd.append('resume', this.resumeFile);
        fd.append('jdContent', this.jdContent);
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 30000);
          const resp = await fetch('/api/interview/init', { method: 'POST', body: fd, signal: controller.signal });
          clearTimeout(timeout);
          const r = await resp.json();
          if (r.code === 200) {
            this.sessionId = r.data.sessionId;
            this.mode = r.data.mode;
            this.isInterviewing = false;
            this.connectSSE();
            this.saveToHistory(this.jdContent.trim().slice(0, 24) + '...');
          } else {
            this.errorMessage = '初始化失败：' + r.msg;
            this.isInterviewing = false;
          }
        } catch (e) {
          this.errorMessage = e.name === 'AbortError' ? '连接超时，请重试' : '网络错误，请检查连接';
          this.isInterviewing = false;
        }
      },
      async sendMessage() {
        if (!this.userInput.trim() || !this.sessionId) return;
        this.messages.push({ type: 'user', content: this.userInput, _key: ++this.msgCounter });
        const msg = this.userInput;
        this.userInput = '';
        this.$nextTick(() => this.scrollToBottom());
        try {
          const r = await (await fetch('/api/interview/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: this.sessionId, userMessage: msg }),
          })).json();
          if (r.code === 200) this.connectSSE(r.data.messageId);
          else this.errorMessage = '发送失败：' + r.msg;
        } catch (e) { this.errorMessage = '发送失败，请检查网络'; }
      },
      connectSSE(mid) {
        if (this.eventSource) this.eventSource.close();
        this.isTyping = true;
        this.errorMessage = '';
        let url = `/api/interview/chat/stream?sessionId=${this.sessionId}`;
        if (mid) url += `&messageId=${mid}`;
        const es = new EventSource(url);
        this.eventSource = es;
        let isNormalClose = false;

        es.addEventListener('token', (e) => {
          const li = this.messages.length - 1;
          const lm = this.messages[li];
          if (lm && lm.type === 'ai' && lm.streaming) {
            this.messages[li] = { ...lm, content: lm.content + e.data };
          } else {
            this.messages.push({ type: 'ai', content: e.data, streaming: true, _key: ++this.msgCounter });
          }
          this.$nextTick(() => this.scrollToBottom());
        });

        es.addEventListener('status', (e) => {
          try {
            const d = JSON.parse(e.data);
            this.currentStage = d.stage;
            this.stageTurnCount = d.stageTurnCount;
            this.totalTurns = d.totalTurns;
            this.scores = d.scores;
            this.questionTags = d.questionTags || [];
            this.updateHistoryTurnCount();
            isNormalClose = true;
            if (d.next_question) {
              const li = this.messages.length - 1;
              const lm = this.messages[li];
              if (lm && lm.streaming) {
                this.messages[li] = { type: 'ai', content: marked.parse(d.next_question), streaming: false, _key: lm._key };
              } else {
                this.messages.push({ type: 'ai', content: marked.parse(d.next_question), streaming: false, _key: ++this.msgCounter });
              }
            }
            this.$nextTick(() => { this.scrollToBottom(); this.isTyping = false; });
          } catch(e) { console.error('status parse error', e); this.isTyping = false; }
        });

        es.addEventListener('end', () => { isNormalClose = true; this.isInterviewEnded = true; this.isTyping = false; });
        es.onerror = () => {
          es.close();
          this.isTyping = false;
          if (!isNormalClose) this.errorMessage = 'AI 服务暂时不可用，请稍后重试';
        };
      },
      async endInterview() {
        if (this.isEvaluating || !this.sessionId || this.isInterviewEnded) return;
        this.isEvaluating = true;
        this.errorMessage = '';
        try {
          const r = await (await fetch('/api/interview/evaluate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: this.sessionId }),
          })).json();
          if (r.code === 200) {
            this.messages.push({ type: 'ai', content: marked.parse(r.data.report), _key: ++this.msgCounter });
            this.isInterviewEnded = true;
            this.$nextTick(() => this.scrollToBottom());
          } else { this.errorMessage = '评估失败：' + r.msg; }
        } catch(e) { this.errorMessage = '评估失败，请检查网络'; }
        finally { this.isEvaluating = false; }
      },
      async evaluateInterview() {
        if (this.isEvaluating || !this.sessionId) return;
        this.isEvaluating = true;
        this.errorMessage = '';
        try {
          const r = await (await fetch('/api/interview/evaluate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sessionId: this.sessionId }),
          })).json();
          if (r.code === 200) {
            this.messages.push({ type: 'ai', content: marked.parse(r.data.report), _key: ++this.msgCounter });
            this.$nextTick(() => this.scrollToBottom());
          } else {
            this.errorMessage = '评估失败：' + r.msg;
          }
        } catch(e) {
          this.errorMessage = '评估失败，请检查网络';
        } finally {
          this.isEvaluating = false;
        }
      },
      scrollToBottom() {
        this.$nextTick(() => {
          const el = this.$refs.chatRef;
          if (el) el.scrollTop = el.scrollHeight;
        });
      },
      // ===== History sidebar =====
      loadHistory() {
        try {
          const raw = localStorage.getItem('ai_interview_history');
          this.interviewHistory = raw ? JSON.parse(raw) : [];
        } catch(e) { this.interviewHistory = []; }
      },
      saveToHistory(label) {
        const idx = this.interviewHistory.findIndex(h => h.sessionId === this.sessionId);
        const entry = {
          sessionId: this.sessionId,
          label: label || '面试',
          date: new Date().toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }),
          turnCount: this.totalTurns || 0,
        };
        if (idx >= 0) {
          this.interviewHistory[idx] = { ...this.interviewHistory[idx], ...entry };
        } else {
          this.interviewHistory.unshift(entry);
        }
        localStorage.setItem('ai_interview_history', JSON.stringify(this.interviewHistory));
      },
      updateHistoryTurnCount() {
        const idx = this.interviewHistory.findIndex(h => h.sessionId === this.sessionId);
        if (idx >= 0) {
          this.interviewHistory[idx].turnCount = this.totalTurns;
          localStorage.setItem('ai_interview_history', JSON.stringify(this.interviewHistory));
        }
      },
      async resumeSession(sid) {
        if (this.eventSource) this.eventSource.close();
        this.isTyping = false;
        this.errorMessage = '';
        try {
          const r = await (await fetch(`/api/interview/resume?sessionId=${sid}`)).json();
          if (r.code === 200) {
            this.sessionId = sid;
            this.messages = [];
            this.scores = null;
            this.questionTags = [];
            this.isInterviewEnded = false;
            const d = r.data;
            if (d.state) {
              this.currentStage = d.state.stage;
              this.stageTurnCount = d.state.stageTurnCount;
              this.totalTurns = d.state.totalTurns;
            }
            if (d.history) {
              for (const msg of d.history) {
                if (msg.startsWith('用户：')) {
                  this.messages.push({ type: 'user', content: msg.substring(3), _key: ++this.msgCounter });
                } else if (msg.startsWith('AI：')) {
                  this.messages.push({ type: 'ai', content: marked.parse(msg.substring(3)), _key: ++this.msgCounter });
                }
              }
            }
            this.$nextTick(() => this.scrollToBottom());
          } else { this.errorMessage = '恢复会话失败：' + r.msg; }
        } catch(e) { this.errorMessage = '恢复会话失败，请检查网络'; }
      },
      startNewInterview() {
        if (this.eventSource) this.eventSource.close();
        this.sessionId = null;
        this.messages = [];
        this.userInput = '';
        this.isTyping = false;
        this.isInterviewEnded = false;
        this.isEvaluating = false;
        this.errorMessage = '';
        this.currentStage = null;
        this.stageTurnCount = 0;
        this.totalTurns = 0;
        this.scores = null;
        this.questionTags = [];
        this.jdContent = '';
        this.resumeFile = null;
        this.resumeName = '';
      },
      deleteHistoryItem(sessionId) {
        this.interviewHistory = this.interviewHistory.filter(h => h.sessionId !== sessionId);
        localStorage.setItem('ai_interview_history', JSON.stringify(this.interviewHistory));
      },
    },
    watch: {
      phase() {
        if (this.phase === 'interview' || this.phase === 'end') {
          this.$nextTick(() => this.scrollToBottom());
        }
      },
      messages: { deep: true, handler() { this.$nextTick(() => this.scrollToBottom()); } },
    },
    mounted() { this.loadHistory(); },
  }).mount('#app');
  </script>
</body>
</html>
