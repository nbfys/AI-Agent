# 日志配置
logging:
  level:
    root: info
    com.example: debug

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /

# LLM 提供商选择（通过环境变量 LLM_PROVIDER 切换，默认 deepseek）
llm:
  provider: ${LLM_PROVIDER:deepseek}

# Spring 配置
spring:
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/interview_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.aiinterview.entity
