# 日志配置
logging:
  level:
    root: info
    com.example: debug

# 服务器配置
server:
  port: 8081
  servlet:
    context-path: /

# Spring 配置
spring:
  ai:
    dashscope:
      api-key: "${DASHSCOPE_API_KEY:}"
      chat:
        options:
          model: "qwen-turbo"
  # Redis 配置
  redis:
    host: localhost
    port: 6379
    password: 
    database: 0
  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/interview_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.aiinterview.entity